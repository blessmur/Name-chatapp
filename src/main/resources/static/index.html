<!DOCTYPE html>
<html>
<head>
    <title>Ukraine Regional Chat</title>
    <meta charset="UTF-8">

    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs/lib/stomp.min.js"></script>

    <style>
        :root {
            --bg: #f2f4f8;
            --panel-bg: #ffffff;
            --text: #111827;
            --muted: #374151;
            --border: #e5e7eb;
            --chat-bg: #fafafa;
            --message-bg: #e5e7eb;
            --my-message-bg: #2563eb;
            --private-bg: #fef3c7;
            --system-bg: #dbeafe;
            --system-text: #1e40af;
            --primary: #2563eb;
            --danger: #dc2626;
            --success: #16a34a;
            --shadow: rgba(0,0,0,0.08);
        }

        body.dark {
            --bg: #111827;
            --panel-bg: #1f2937;
            --text: #f9fafb;
            --muted: #d1d5db;
            --border: #374151;
            --chat-bg: #111827;
            --message-bg: #374151;
            --my-message-bg: #2563eb;
            --private-bg: #78350f;
            --system-bg: #1e3a8a;
            --system-text: #dbeafe;
            --primary: #60a5fa;
            --danger: #ef4444;
            --success: #22c55e;
            --shadow: rgba(0,0,0,0.35);
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        h1 {
            text-align: center;
            margin: 25px 0;
        }

        .login-page {
            width: 350px;
            margin: 100px auto;
            background: var(--panel-bg);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px var(--shadow);
            text-align: center;
        }

        .login-page input,
        .login-page button {
            width: 100%;
            padding: 10px;
            margin-top: 12px;
            box-sizing: border-box;
        }

        .login-page input,
        .message-box input,
        .settings-menu select,
        .search-input {
            background: var(--panel-bg);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 6px;
        }

        .login-page button,
        .message-box button,
        .settings-button,
        .map-button {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        .detected-region-box {
            margin-top: 14px;
            padding: 10px;
            border-radius: 8px;
            background: var(--chat-bg);
            border: 1px solid var(--border);
            font-size: 14px;
            color: var(--muted);
            line-height: 1.5;
        }

        .layout {
            display: grid;
            grid-template-columns: 260px 1fr 380px;
            gap: 20px;
            padding: 0 30px 30px;
        }

        .panel {
            background: var(--panel-bg);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 15px var(--shadow);
        }

        .user-panel,
        .chat-panel,
        .stats-panel {
            height: 660px;
        }

        .user-panel {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .chat-panel {
            display: flex;
            flex-direction: column;
        }

        .stats-panel {
            overflow-y: auto;
        }

        .chat-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logout-button {
            background: var(--danger);
            color: white;
            border: none;
            border-radius: 6px;
            padding: 7px 12px;
            cursor: pointer;
        }

        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
        }

        .tabs button {
            flex: 1;
            padding: 9px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: var(--message-bg);
            color: var(--text);
        }

        .tabs button.active {
            background: var(--primary);
            color: white;
        }

        .search-input {
            width: 100%;
            padding: 9px;
            margin-bottom: 10px;
            box-sizing: border-box;
        }

        #privateInfo {
            display: none;
            margin-bottom: 8px;
            padding: 8px;
            background: var(--private-bg);
            border-radius: 8px;
            font-size: 14px;
        }

        #privateInfo button {
            float: right;
            border: none;
            background: transparent;
            cursor: pointer;
            color: var(--text);
            font-weight: bold;
        }

        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--chat-bg);
            list-style: none;
        }

        #messages li {
            margin-bottom: 10px;
            padding: 9px 11px;
            border-radius: 12px;
            max-width: 75%;
            clear: both;
            word-wrap: break-word;
        }

        #messages li.system {
            background: var(--system-bg);
            color: var(--system-text);
            font-style: italic;
            text-align: center;
            max-width: 100%;
            margin-left: auto;
            margin-right: auto;
        }

        #messages li.my-message {
            background: var(--my-message-bg);
            color: white;
            margin-left: auto;
            text-align: right;
        }

        #messages li.other-message {
            background: var(--message-bg);
            margin-right: auto;
        }

        #messages li.private {
            background: var(--private-bg);
            color: var(--text);
        }

        .message-meta {
            font-size: 12px;
            opacity: 0.75;
            margin-bottom: 4px;
        }

        .message-content {
            font-size: 14px;
        }

        #typingIndicator {
            min-height: 18px;
            font-size: 13px;
            color: var(--muted);
            margin-bottom: 5px;
        }

        .message-box {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .message-box input {
            flex: 1;
            padding: 10px;
        }

        .message-box button {
            padding: 10px 18px;
        }

        .settings-box {
            border-top: 1px solid var(--border);
            padding-top: 15px;
        }

        .settings-main-button {
            width: 100%;
            padding: 10px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        .settings-menu {
            display: none;
            margin-top: 10px;
        }

        .settings-button {
            width: 100%;
            padding: 10px;
            margin-top: 8px;
        }

        .settings-menu select {
            width: 100%;
            padding: 9px;
            margin-top: 8px;
        }

        .settings-status {
            margin-top: 10px;
            font-size: 13px;
            color: var(--muted);
        }

        .map-box {
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 15px;
            background: var(--chat-bg);
        }

        .map-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            gap: 10px;
        }

        .map-header h3 {
            margin: 0;
            font-size: 16px;
        }

        .map-button {
            padding: 7px 10px;
            font-size: 13px;
        }

        .ukraine-map {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 6px;
            transition: 0.25s;
        }

        .ukraine-map.big {
            grid-template-columns: repeat(4, 1fr);
            gap: 9px;
        }

        .map-region {
            min-height: 48px;
            padding: 6px;
            border-radius: 9px;
            border: 1px solid var(--border);
            background: var(--panel-bg);
            cursor: pointer;
            font-size: 11px;
            color: var(--text);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: 0.2s;
        }

        .map-region:hover {
            transform: scale(1.05);
            border-color: var(--primary);
        }

        .map-region.active-region {
            background: rgba(37, 99, 235, 0.18);
            border-color: var(--primary);
        }

        .map-region.selected-map-region {
            background: var(--primary);
            color: white;
        }

        .map-region-count {
            font-weight: bold;
            font-size: 15px;
            color: var(--success);
        }

        .selected-map-region .map-region-count {
            color: white;
        }

        .region-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
            font-size: 14px;
            cursor: pointer;
        }

        .region-name {
            display: flex;
            gap: 6px;
            align-items: center;
        }

        .region-count {
            font-weight: bold;
            color: var(--primary);
        }

        .region-users {
            display: none;
            margin: 5px 0 10px 22px;
            font-size: 13px;
            color: var(--muted);
        }

        .region-users div {
            padding: 4px 0;
            cursor: pointer;
        }

        .region-users div:hover {
            color: var(--primary);
        }

        @media (max-width: 1100px) {
            .layout {
                grid-template-columns: 1fr;
                padding: 0 15px 20px;
            }

            .user-panel,
            .chat-panel,
            .stats-panel {
                height: auto;
            }

            .chat-panel {
                min-height: 560px;
            }

            .message-box {
                flex-direction: column;
            }

            .tabs {
                flex-direction: column;
            }

            #messages li {
                max-width: 90%;
            }

            .login-page {
                width: calc(100% - 40px);
                margin: 60px auto;
            }

            .ukraine-map {
                grid-template-columns: repeat(3, 1fr);
            }
        }
    </style>
</head>
<body>

<div id="loginPage" class="login-page">
    <h2>Ukraine Regional Chat</h2>

    <input id="loginUsername" placeholder="Введіть ім'я">

    <div class="detected-region-box">
        <div>Ваша область буде визначена автоматично за IP.</div>
        <div><b>Область:</b> <span id="detectedRegion">визначається...</span></div>
    </div>

    <button onclick="login()">Увійти</button>
</div>

<div id="chatPage" style="display: none;">
    <h1>Ukraine Regional Chat</h1>

    <div class="layout">
        <div class="panel user-panel">
            <div>
                <h3>Користувач</h3>
                <p><b>Ім'я:</b> <span id="currentUsername"></span></p>
                <p><b>Область:</b> <span id="currentRegion"></span></p>
                <p><b>Статус:</b> <span id="currentStatus">🟢 Онлайн</span></p>
            </div>

            <div class="settings-box">
                <button class="settings-main-button" onclick="toggleSettingsMenu()">⚙️ Налаштування</button>

                <div id="settingsMenu" class="settings-menu">
                    <button class="settings-button" onclick="toggleTheme()">🌙 Змінити тему</button>
                    <button class="settings-button" onclick="changeUsername()">✏️ Змінити ім’я</button>
                    <button class="settings-button" onclick="toggleSound()">🔔 Звук повідомлень</button>

                    <select id="statusSelect" onchange="changeStatus()">
                        <option value="ONLINE">🟢 Онлайн</option>
                        <option value="AWAY">🟡 Відійшов</option>
                        <option value="BUSY">🔴 Зайнятий</option>
                    </select>

                    <select id="regionSelect" onchange="changeRegion()"></select>

                    <div class="settings-status">
                        <div>Звук: <b id="soundStatus">Увімкнено</b></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="panel chat-panel">
            <div class="chat-top">
                <h3>Чат</h3>
                <button class="logout-button" onclick="logout()">Вийти</button>
            </div>

            <div class="tabs">
                <button id="tabGENERAL" class="active" onclick="switchRoom('GENERAL')">🌐 Загальний</button>
                <button id="tabREGION" onclick="switchRoom('REGION')">🏠 Моя область</button>
                <button id="tabPRIVATE" onclick="switchRoom('PRIVATE')">💬 Приватні</button>
            </div>

            <input id="searchInput" class="search-input" placeholder="🔍 Пошук по повідомленнях" oninput="renderCurrentRoom()">

            <div id="privateInfo">
                Приватний чат з: <b id="privateRecipientName"></b>
                <button onclick="cancelPrivateMode()">×</button>
            </div>

            <ul id="messages"></ul>

            <div id="typingIndicator"></div>

            <div class="message-box">
                <input id="message" placeholder="Введіть повідомлення" disabled>
                <button id="sendButton" onclick="sendMessage()" disabled>Надіслати</button>
            </div>
        </div>

        <div class="panel stats-panel">
            <div class="map-box">
                <div class="map-header">
                    <h3>🗺️ Карта України онлайн</h3>
                    <button class="map-button" onclick="toggleMapSize()">Збільшити</button>
                </div>

                <div id="ukraineMap" class="ukraine-map"></div>
            </div>

            <h3>Користувачі онлайн по областях</h3>
            <div id="stats"></div>
        </div>
    </div>
</div>

<script>
    let stompClient = null;
    let privateSubscription = null;

    let currentUsername = "";
    let currentRegion = "Запорізька область";
    let detectedRegion = "";
    let selectedRegion = localStorage.getItem("selectedRegion") || "";
    let currentStatus = "ONLINE";
    let connected = false;

    let currentRoom = "GENERAL";
    let soundEnabled = true;
    let privateRecipient = "";

    let typingTimeout = null;
    let typingSendTimeout = null;

    let mapStats = {};

    let messagesStore = {
        GENERAL: [],
        REGION: [],
        PRIVATE: [],
        SYSTEM: []
    };

    const regions = [
        "Вінницька область",
        "Волинська область",
        "Дніпропетровська область",
        "Донецька область",
        "Житомирська область",
        "Закарпатська область",
        "Запорізька область",
        "Івано-Франківська область",
        "Київська область",
        "Кіровоградська область",
        "Луганська область",
        "Львівська область",
        "Миколаївська область",
        "Одеська область",
        "Полтавська область",
        "Рівненська область",
        "Сумська область",
        "Тернопільська область",
        "Харківська область",
        "Херсонська область",
        "Хмельницька область",
        "Черкаська область",
        "Чернівецька область",
        "Чернігівська область"
    ];

    function createRegionSelect() {
        let select = document.getElementById("regionSelect");
        select.innerHTML = "";

        regions.forEach(region => {
            let option = document.createElement("option");
            option.value = region;
            option.innerText = region;
            select.appendChild(option);
        });
    }

    function createUkraineMap() {
        let map = document.getElementById("ukraineMap");
        map.innerHTML = "";

        regions.forEach(region => {
            let div = document.createElement("div");
            div.className = "map-region";
            div.dataset.region = region;
            div.title = region + ": 0 онлайн";

            div.onclick = function () {
                selectMapRegion(region);
            };

            div.innerHTML = `
                <span>${shortRegionName(region)}</span>
                <span class="map-region-count">0</span>
            `;

            map.appendChild(div);
        });
    }

    function shortRegionName(region) {
        return region
            .replace(" область", "")
            .replace("Івано-Франківська", "Ів.-Франківська")
            .replace("Дніпропетровська", "Дніпро")
            .replace("Кіровоградська", "Кіровоград")
            .replace("Хмельницька", "Хмельн.");
    }

    function updateMapStats(data) {
        mapStats = data || {};

        document.querySelectorAll(".map-region").forEach(regionDiv => {
            let region = regionDiv.dataset.region;
            let users = mapStats[region] || [];
            let count = users.length;

            regionDiv.querySelector(".map-region-count").innerText = count;
            regionDiv.title = region + ": " + count + " онлайн";

            regionDiv.classList.toggle("active-region", count > 0);
            regionDiv.classList.toggle("selected-map-region", region === currentRegion);
        });
    }

    function selectMapRegion(region) {
        selectedRegion = region;
        currentRegion = region;

        localStorage.setItem("selectedRegion", region);

        document.getElementById("currentRegion").innerText = currentRegion;
        document.getElementById("detectedRegion").innerText = currentRegion;
        document.getElementById("regionSelect").value = currentRegion;

        updateMapStats(mapStats);
        loadHistory();
        switchRoom("REGION");

        if (connected && stompClient && currentUsername !== "") {
            stompClient.send("/app/status", {}, JSON.stringify({
                username: currentUsername,
                region: currentRegion,
                content: "",
                type: "STATUS",
                status: currentStatus
            }));
        }
    }

    function toggleMapSize() {
        let map = document.getElementById("ukraineMap");
        let button = document.querySelector(".map-button");

        map.classList.toggle("big");

        if (map.classList.contains("big")) {
            button.innerText = "Зменшити";
        } else {
            button.innerText = "Збільшити";
        }
    }

    function detectRegion() {
        fetch("/api/geo/region")
            .then(response => response.json())
            .then(data => {
                detectedRegion = data.region || "Запорізька область";
                currentRegion = selectedRegion !== "" ? selectedRegion : detectedRegion;

                document.getElementById("detectedRegion").innerText = currentRegion;
                document.getElementById("regionSelect").value = currentRegion;
                updateMapStats(mapStats);
            })
            .catch(() => {
                detectedRegion = "Запорізька область";
                currentRegion = selectedRegion !== "" ? selectedRegion : detectedRegion;

                document.getElementById("detectedRegion").innerText = currentRegion;
                document.getElementById("regionSelect").value = currentRegion;
                updateMapStats(mapStats);
            });
    }

    function toggleSettingsMenu() {
        let menu = document.getElementById("settingsMenu");
        menu.style.display = menu.style.display === "block" ? "none" : "block";
    }

    function toggleTheme() {
        document.body.classList.toggle("dark");
        localStorage.setItem("theme", document.body.classList.contains("dark") ? "dark" : "light");
    }

    function changeUsername() {
        let newName = prompt("Введіть нове ім’я:");

        if (newName === null) return;

        newName = newName.trim();

        if (newName === "") {
            alert("Ім’я не може бути порожнім");
            return;
        }

        let oldName = currentUsername;

        currentUsername = newName;
        document.getElementById("currentUsername").innerText = currentUsername;

        subscribePrivateMessages();
        loadHistory();

        if (connected && stompClient) {
            stompClient.send("/app/leave", {}, JSON.stringify({
                username: oldName,
                region: currentRegion,
                content: "",
                type: "LEAVE"
            }));

            stompClient.send("/app/join", {}, JSON.stringify({
                username: currentUsername,
                region: currentRegion,
                content: "",
                type: "JOIN",
                status: currentStatus
            }));
        }
    }

    function toggleSound() {
        soundEnabled = !soundEnabled;
        localStorage.setItem("soundEnabled", soundEnabled ? "true" : "false");
        updateSettingsStatus();
    }

    function changeStatus() {
        currentStatus = document.getElementById("statusSelect").value;
        localStorage.setItem("status", currentStatus);

        document.getElementById("currentStatus").innerText = getStatusText(currentStatus);

        if (connected && stompClient && currentUsername !== "") {
            stompClient.send("/app/status", {}, JSON.stringify({
                username: currentUsername,
                region: currentRegion,
                content: "",
                type: "STATUS",
                status: currentStatus
            }));
        }
    }

    function changeRegion() {
        selectedRegion = document.getElementById("regionSelect").value;
        selectMapRegion(selectedRegion);
        alert("Область змінено на: " + currentRegion);
    }

    function getStatusText(status) {
        if (status === "AWAY") return "🟡 Відійшов";
        if (status === "BUSY") return "🔴 Зайнятий";
        return "🟢 Онлайн";
    }

    function updateSettingsStatus() {
        document.getElementById("soundStatus").innerText = soundEnabled ? "Увімкнено" : "Вимкнено";
    }

    function loadSettings() {
        if (localStorage.getItem("theme") === "dark") {
            document.body.classList.add("dark");
        }

        soundEnabled = localStorage.getItem("soundEnabled") !== "false";
        currentStatus = localStorage.getItem("status") || "ONLINE";

        document.getElementById("statusSelect").value = currentStatus;
        document.getElementById("currentStatus").innerText = getStatusText(currentStatus);

        if (selectedRegion !== "") {
            currentRegion = selectedRegion;
        }

        document.getElementById("regionSelect").value = currentRegion;
        updateSettingsStatus();
    }

    function getCurrentTime() {
        return new Date().toLocaleTimeString([], {
            hour: "2-digit",
            minute: "2-digit"
        });
    }

    function formatMessageTime(createdAt) {
        if (!createdAt) {
            return getCurrentTime();
        }

        let date = new Date(createdAt);

        return date.toLocaleTimeString([], {
            hour: "2-digit",
            minute: "2-digit"
        });
    }

    function playNotificationSound() {
        if (!soundEnabled) return;

        let audio = new Audio("https://www.soundjay.com/buttons/sounds/button-3.mp3");
        audio.volume = 0.3;
        audio.play().catch(function () {});
    }

    function connect(callback) {
        let socket = new SockJS(window.location.origin + "/chat");
        stompClient = Stomp.over(socket);
        stompClient.debug = null;

        stompClient.connect({}, function () {
            connected = true;

            stompClient.subscribe("/topic/messages", function (msg) {
                let message = JSON.parse(msg.body);
                message.time = formatMessageTime(message.createdAt);
                messagesStore.SYSTEM.push(message);
                renderCurrentRoom();
            });

            stompClient.subscribe("/topic/room/GENERAL", function (msg) {
                let message = JSON.parse(msg.body);
                message.time = formatMessageTime(message.createdAt);
                messagesStore.GENERAL.push(message);
                renderCurrentRoom();

                if (message.username !== currentUsername) {
                    playNotificationSound();
                }
            });

            stompClient.subscribe("/topic/room/REGION", function (msg) {
                let message = JSON.parse(msg.body);
                message.time = formatMessageTime(message.createdAt);

                if (message.region === currentRegion) {
                    messagesStore.REGION.push(message);
                    renderCurrentRoom();

                    if (message.username !== currentUsername) {
                        playNotificationSound();
                    }
                }
            });

            stompClient.subscribe("/topic/stats", function (msg) {
                let data = JSON.parse(msg.body);
                renderStats(data);
                updateMapStats(data);
            });

            stompClient.subscribe("/topic/typing", function (msg) {
                showTyping(JSON.parse(msg.body));
            });

            subscribePrivateMessages();

            document.getElementById("message").disabled = false;
            document.getElementById("sendButton").disabled = false;

            if (callback) callback();

        }, function () {
            connected = false;

            setTimeout(function () {
                connect(callback);
            }, 3000);
        });
    }

    function subscribePrivateMessages() {
        if (!stompClient || !connected || currentUsername === "") return;

        if (privateSubscription) {
            privateSubscription.unsubscribe();
        }

        privateSubscription = stompClient.subscribe("/topic/private/" + currentUsername, function (msg) {
            let message = JSON.parse(msg.body);
            message.time = formatMessageTime(message.createdAt);
            messagesStore.PRIVATE.push(message);
            renderCurrentRoom();

            if (message.username !== currentUsername) {
                playNotificationSound();
            }
        });
    }

    function login() {
        currentUsername = document.getElementById("loginUsername").value.trim();

        if (currentUsername === "") {
            alert("Введіть ім'я");
            return;
        }

        document.getElementById("currentUsername").innerText = currentUsername;
        document.getElementById("currentRegion").innerText = currentRegion;
        document.getElementById("currentStatus").innerText = getStatusText(currentStatus);

        document.getElementById("loginPage").style.display = "none";
        document.getElementById("chatPage").style.display = "block";

        updateMapStats(mapStats);

        if (!connected) {
            connect(sendJoinMessage);
        } else {
            sendJoinMessage();
        }
    }

    function sendJoinMessage() {
        loadHistory();

        stompClient.send("/app/join", {}, JSON.stringify({
            username: currentUsername,
            region: currentRegion,
            content: "",
            type: "JOIN",
            status: currentStatus
        }));

        changeStatus();
    }

    function loadHistory() {
        fetch("/api/messages/general")
            .then(response => response.json())
            .then(data => {
                messagesStore.GENERAL = [];
                messagesStore.SYSTEM = [];

                data.forEach(message => {
                    message.time = formatMessageTime(message.createdAt);

                    if (message.type === "JOIN" || message.type === "LEAVE") {
                        messagesStore.SYSTEM.push(message);
                    }

                    if (message.type === "GENERAL") {
                        messagesStore.GENERAL.push(message);
                    }
                });

                renderCurrentRoom();
            });

        fetch("/api/messages/region?region=" + encodeURIComponent(currentRegion))
            .then(response => response.json())
            .then(data => {
                messagesStore.REGION = [];

                data.forEach(message => {
                    message.time = formatMessageTime(message.createdAt);

                    if (message.type === "REGION") {
                        messagesStore.REGION.push(message);
                    }
                });

                renderCurrentRoom();
            });

        fetch("/api/messages/private?username=" + encodeURIComponent(currentUsername))
            .then(response => response.json())
            .then(data => {
                messagesStore.PRIVATE = [];

                data.forEach(message => {
                    message.time = formatMessageTime(message.createdAt);
                    messagesStore.PRIVATE.push(message);
                });

                renderCurrentRoom();
            });
    }

    function switchRoom(room) {
        currentRoom = room;

        document.querySelectorAll(".tabs button").forEach(function (button) {
            button.classList.remove("active");
        });

        document.getElementById("tab" + room).classList.add("active");

        if (room === "GENERAL") {
            document.getElementById("message").placeholder = "Повідомлення в загальний чат";
        }

        if (room === "REGION") {
            document.getElementById("message").placeholder = "Повідомлення в чат області";
        }

        if (room === "PRIVATE") {
            if (privateRecipient !== "") {
                document.getElementById("message").placeholder = "Приватне повідомлення для " + privateRecipient;
            } else {
                document.getElementById("message").placeholder = "Оберіть користувача справа";
            }
        }

        renderCurrentRoom();
    }

    function sendMessage() {
        let content = document.getElementById("message").value.trim();

        if (content === "" || !connected) return;

        if (currentRoom === "PRIVATE") {
            if (privateRecipient === "") {
                alert("Оберіть користувача справа у списку онлайн");
                return;
            }

            stompClient.send("/app/private", {}, JSON.stringify({
                username: currentUsername,
                recipient: privateRecipient,
                region: currentRegion,
                content: content,
                type: "PRIVATE"
            }));
        } else {
            stompClient.send("/app/room", {}, JSON.stringify({
                username: currentUsername,
                region: currentRegion,
                content: content,
                type: currentRoom
            }));
        }

        document.getElementById("message").value = "";
        document.getElementById("typingIndicator").innerText = "";
    }

    document.getElementById("message").addEventListener("keydown", function (event) {
        if (event.key === "Enter") {
            sendMessage();
        }
    });

    document.getElementById("message").addEventListener("input", function () {
        sendTyping();
    });

    function sendTyping() {
        if (!connected || !stompClient || currentUsername === "") return;

        if (typingSendTimeout) return;

        stompClient.send("/app/typing", {}, JSON.stringify({
            username: currentUsername,
            region: currentRegion,
            content: currentRoom,
            type: "TYPING",
            recipient: privateRecipient
        }));

        typingSendTimeout = setTimeout(function () {
            typingSendTimeout = null;
        }, 800);
    }

    function showTyping(message) {
        if (message.username === currentUsername) return;
        if (message.content !== currentRoom) return;
        if (currentRoom === "REGION" && message.region !== currentRegion) return;

        if (currentRoom === "PRIVATE") {
            if (message.recipient !== currentUsername) return;
            document.getElementById("typingIndicator").innerText = message.username + " пише приватне повідомлення...";
        } else {
            document.getElementById("typingIndicator").innerText = message.username + " друкує...";
        }

        clearTimeout(typingTimeout);
        typingTimeout = setTimeout(function () {
            document.getElementById("typingIndicator").innerText = "";
        }, 2000);
    }

    function renderCurrentRoom() {
        let messagesList = document.getElementById("messages");
        let searchText = document.getElementById("searchInput").value.toLowerCase();

        messagesList.innerHTML = "";

        let list = [];

        if (currentRoom === "GENERAL") {
            list = messagesStore.SYSTEM.concat(messagesStore.GENERAL);
        }

        if (currentRoom === "REGION") {
            list = messagesStore.SYSTEM.concat(messagesStore.REGION);
        }

        if (currentRoom === "PRIVATE") {
            list = messagesStore.PRIVATE;
        }

        list.forEach(function (message) {
            let textForSearch = (
                (message.username || "") + " " +
                (message.region || "") + " " +
                (message.content || "") + " " +
                (message.recipient || "")
            ).toLowerCase();

            if (!textForSearch.includes(searchText)) return;

            appendMessageToList(message);
        });

        messagesList.scrollTop = messagesList.scrollHeight;
    }

    function appendMessageToList(message) {
        let li = document.createElement("li");

        if (message.type === "JOIN" || message.type === "LEAVE") {
            li.className = "system";
            li.innerText = "[" + message.time + "] " + message.content;
            document.getElementById("messages").appendChild(li);
            return;
        }

        if (message.type === "PRIVATE") {
            li.className = message.username === currentUsername ? "my-message private" : "other-message private";
        } else {
            li.className = message.username === currentUsername ? "my-message" : "other-message";
        }

        let meta = document.createElement("div");
        meta.className = "message-meta";

        if (message.type === "PRIVATE") {
            meta.innerText = "[" + message.time + "] 🔒 " + message.username + " → " + message.recipient;
        } else {
            meta.innerText = "[" + message.time + "] " + message.username + " • " + message.region;
        }

        let content = document.createElement("div");
        content.className = "message-content";
        content.innerText = message.content;

        li.appendChild(meta);
        li.appendChild(content);

        document.getElementById("messages").appendChild(li);
    }

    function logout() {
        if (stompClient && connected && currentUsername !== "") {
            stompClient.send("/app/leave", {}, JSON.stringify({
                username: currentUsername,
                region: currentRegion,
                content: "",
                type: "LEAVE"
            }));

            stompClient.disconnect(function () {
                location.reload();
            });
        } else {
            location.reload();
        }
    }

    function startPrivateMessage(username) {
        if (username === currentUsername) return;

        privateRecipient = username;

        document.getElementById("privateRecipientName").innerText = username;
        document.getElementById("privateInfo").style.display = "block";

        switchRoom("PRIVATE");
    }

    function cancelPrivateMode() {
        privateRecipient = "";

        document.getElementById("privateInfo").style.display = "none";
        document.getElementById("privateRecipientName").innerText = "";

        if (currentRoom === "PRIVATE") {
            document.getElementById("message").placeholder = "Оберіть користувача справа";
        }
    }

    function renderStats(data) {
        let statsDiv = document.getElementById("stats");
        statsDiv.innerHTML = "";

        regions.forEach(region => {
            let users = data[region] || [];

            let wrapper = document.createElement("div");

            let header = document.createElement("div");
            header.className = "region-header";

            let name = document.createElement("span");
            name.className = "region-name";
            name.innerHTML = `<span class="arrow">▶</span><span>${region}</span>`;

            let count = document.createElement("span");
            count.className = "region-count";
            count.innerText = users.length;

            let usersDiv = document.createElement("div");
            usersDiv.className = "region-users";

            if (users.length === 0) {
                usersDiv.innerHTML = "<div>Немає користувачів онлайн</div>";
            } else {
                users.forEach(user => {
                    let username = user.username;
                    let status = user.status;

                    let userDiv = document.createElement("div");
                    userDiv.innerText = getStatusText(status) + " " + username;

                    userDiv.onclick = function () {
                        startPrivateMessage(username);
                    };

                    usersDiv.appendChild(userDiv);
                });
            }

            header.onclick = function () {
                let arrow = header.querySelector(".arrow");

                if (usersDiv.style.display === "block") {
                    usersDiv.style.display = "none";
                    arrow.innerText = "▶";
                } else {
                    usersDiv.style.display = "block";
                    arrow.innerText = "▼";
                }
            };

            header.appendChild(name);
            header.appendChild(count);

            wrapper.appendChild(header);
            wrapper.appendChild(usersDiv);

            statsDiv.appendChild(wrapper);
        });
    }

    window.addEventListener("beforeunload", function () {
        if (stompClient && connected && currentUsername !== "") {
            stompClient.send("/app/leave", {}, JSON.stringify({
                username: currentUsername,
                region: currentRegion,
                content: "",
                type: "LEAVE"
            }));
        }
    });

    createRegionSelect();
    createUkraineMap();
    loadSettings();
    detectRegion();
</script>

</body>
</html>
