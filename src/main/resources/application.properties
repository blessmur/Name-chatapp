spring.application.name=chatapp

server.port=${PORT:8082}

# Database
spring.datasource.url=${DATABASE_URL:jdbc:h2:file:./data/chatdb}
spring.datasource.username=${DATABASE_USERNAME:sa}
spring.datasource.password=${DATABASE_PASSWORD:}
spring.datasource.driver-class-name=${DATABASE_DRIVER:org.h2.Driver}

# Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# UTF-8
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# Timezone
spring.jackson.time-zone=Europe/Kyiv
user.timezone=Europe/Kyiv